<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Report Flood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="ReportFlood.css">
    <style>
        /* Map picker collapsible styles */
        .map-picker-wrapper {
            margin: 16px 0;
        }
        .toggle-map-btn {
            background: #007aff;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            margin-bottom: 12px;
        }
        .map-container {
            display: none;
            margin-top: 12px;
        }
        .map-container.visible {
            display: block;
        }
        #locationMap {
            height: 280px;
            width: 100%;
            border-radius: 16px;
            border: 1px solid #2c2c2e;
            background: #1c1c1e;
            margin-bottom: 8px;
        }
        .gps-btn {
            background: #34c759;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 8px;
        }
        .coord-hint {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
        }
        .location-status {
            font-size: 12px;
            color: #34c759;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
            <i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i>
        </div>
    </div>
    <div class="back-btn"><i class="fas fa-chevron-left"></i></div>
    <div class="page-title">Report Flood</div>
    <div class="flood-img-wrap">
        <img src="ff3ebecf9926983edf270610d42865e6.png" alt="Flood">
    </div>
    <div class="tagline">Report near your area</div>
    <div class="form-area">
        <!-- Original Location field -->
        <div class="field-label">Location (text)</div>
        <div class="input-box">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" id="locationInput" placeholder="Enter Location (e.g., Barangay, City)">
        </div>

        <!-- Collapsible map picker -->
        <div class="map-picker-wrapper">
            <button type="button" class="toggle-map-btn" id="toggleMapBtn">
                <i class="fas fa-map-pin"></i> Pin exact location on map
            </button>
            <div class="map-container" id="mapContainer">
                <div id="locationMap"></div>
                <button type="button" class="gps-btn" id="gpsBtn"><i class="fas fa-location-dot"></i> Use my current location</button>
                <div class="coord-hint" id="coordHint">Tap the map or use GPS to set marker. Drag to adjust.</div>
            </div>
            <div id="locationStatus" class="location-status" style="display: none;">
                <i class="fas fa-check-circle"></i> <span id="statusText">Location pinned</span>
            </div>
        </div>

        <!-- Original Image Upload area -->
        <div class="image-upload-area">
            <div class="field-label">Upload Photos</div>
            <div class="upload-box" id="uploadBox">
                <i class="fas fa-camera"></i>
                <p>Tap to take photo or select from gallery</p>
            </div>
            <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
            <div class="image-preview" id="imagePreview"></div>
            <div class="image-count" id="imageCount">0 image(s) selected</div>
        </div>

        <!-- Original Additional Details -->
        <div class="details-label">Additional Details</div>
        <div class="textarea-box">
            <textarea id="detailsInput" placeholder="Enter details (e.g., extent of flooding)"></textarea>
        </div>
    </div>
    <div class="submit-wrap">
        <button class="submit-btn" id="submitBtn">Submit Report</button>
    </div>
    <div class="bottom-nav">
        <button class="nav-item" id="navRequest"><i class="fas fa-hand-holding-water"></i><span>Request Help</span></button>
        <button class="nav-item" id="navHotlines"><i class="fas fa-phone-alt"></i><span>Hotlines</span></button>
        <button class="nav-item active" id="navReport"><i class="fas fa-exclamation-triangle"></i><span>Report Flood</span></button>
        <button class="nav-item" id="navMyReports"><i class="fas fa-clipboard-list"></i><span>All Reports</span></button>
        <button class="nav-item" id="navAccount"><i class="fas fa-user"></i><span>Account Info</span></button>
    </div>
    <div class="toast" id="toast"></div>
    <div class="loading" id="loading">Submitting...</div>
</div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { addDoc, collection, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    function navigateTo(page) { window.location.href = page; }

    // Navigation
    document.querySelector('.back-btn').onclick = () => navigateTo('Homepage.html');
    document.getElementById('navRequest').onclick = () => navigateTo('RequestHelp.html');
    document.getElementById('navHotlines').onclick = () => navigateTo('Hotline.html');
    document.getElementById('navReport').onclick = () => navigateTo('ReportFlood.html');
    document.getElementById('navMyReports').onclick = () => navigateTo('MyReports.html');
    document.getElementById('navAccount').onclick = () => navigateTo('AccountInfo.html');

    // Cloudinary config
    const CLOUD_NAME = 'dz9edwf4q';    
    const UPLOAD_PRESET = 'tabang_uploads';    

    let currentUser = null;
    let selectedImages = [];
    const MAX_IMAGES = 5;
    const MAX_FILE_SIZE = 5 * 1024 * 1024;

    // ----- MAP LOGIC (lazy initialization) -----
    let map = null;
    let marker = null;
    let selectedLat = null;
    let selectedLng = null;
    let mapInitialized = false;

    function initMap() {
        if (mapInitialized) return;
        const container = document.getElementById('locationMap');
        if (!container) return;

        const defaultCenter = [11.6, 122.4];
        map = L.map(container).setView(defaultCenter, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        marker = L.marker(defaultCenter, { draggable: true }).addTo(map);
        
        marker.on('dragend', () => updateCoords(marker.getLatLng()));
        map.on('click', (e) => {
            marker.setLatLng(e.latlng);
            updateCoords(e.latlng);
        });

        // Set initial coords
        updateCoords({ lat: defaultCenter[0], lng: defaultCenter[1] });
        mapInitialized = true;
    }

    function updateCoords(latlng) {
        selectedLat = latlng.lat;
        selectedLng = latlng.lng;
        document.getElementById('coordHint').innerHTML = `📍 Marker at: ${selectedLat.toFixed(5)}, ${selectedLng.toFixed(5)}`;
        // Show status indicator
        const statusDiv = document.getElementById('locationStatus');
        statusDiv.style.display = 'flex';
        document.getElementById('statusText').innerHTML = `Location pinned (${selectedLat.toFixed(4)}, ${selectedLng.toFixed(4)})`;
    }

    function useGPS() {
        if (!navigator.geolocation) {
            showToast("Geolocation not supported");
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                if (!mapInitialized) initMap();
                map.setView([lat, lng], 14);
                marker.setLatLng([lat, lng]);
                updateCoords({ lat, lng });
                showToast("Location updated");
            },
            (error) => {
                let msg = "Could not get location. ";
                if (error.code === 1) msg += "Permission denied.";
                else msg += "Try again later.";
                showToast(msg);
            }
        );
    }

    // Toggle map visibility
    const toggleBtn = document.getElementById('toggleMapBtn');
    const mapContainer = document.getElementById('mapContainer');
    toggleBtn.addEventListener('click', () => {
        const isVisible = mapContainer.classList.toggle('visible');
        if (isVisible && !mapInitialized) {
            initMap();
            // Force map resize after becoming visible
            setTimeout(() => { if (map) map.invalidateSize(); }, 200);
        }
        toggleBtn.innerHTML = isVisible ? '<i class="fas fa-chevron-up"></i> Hide map' : '<i class="fas fa-map-pin"></i> Pin exact location on map';
    });

    // ----- Image upload (unchanged) -----
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const imageCount = document.getElementById('imageCount');

    uploadBox.onclick = () => fileInput.click();

    fileInput.onchange = function(e) {
        const files = Array.from(e.target.files);
        if (selectedImages.length + files.length > MAX_IMAGES) {
            showToast(`Maximum ${MAX_IMAGES} images allowed`);
            return;
        }
        files.forEach(file => {
            if (file.size > MAX_FILE_SIZE) {
                showToast(`File ${file.name} is too large (max 5MB)`);
                return;
            }
            if (!file.type.startsWith('image/')) {
                showToast(`File ${file.name} is not an image`);
                return;
            }
            const reader = new FileReader();
            reader.onload = function(evt) {
                selectedImages.push({
                    data: evt.target.result,
                    name: file.name,
                    type: file.type,
                    file: file
                });
                updatePreview();
            };
            reader.readAsDataURL(file);
        });
        fileInput.value = '';
    };

    function updatePreview() {
        imagePreview.innerHTML = '';
        selectedImages.forEach((img, index) => {
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = `
                <img src="${img.data}" alt="Preview">
                <div class="remove-image" onclick="removeImage(${index})">×</div>
            `;
            imagePreview.appendChild(div);
        });
        imageCount.textContent = `${selectedImages.length} image(s) selected`;
    }

    window.removeImage = function(index) {
        selectedImages.splice(index, 1);
        updatePreview();
    };

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
        const response = await fetch(url, { method: 'POST', body: formData });
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error?.message || 'Upload failed');
        }
        const data = await response.json();
        return data.secure_url;
    }

    // ----- Submit report with coordinates -----
    document.getElementById('submitBtn').onclick = async function() {
        if (!currentUser) {
            showToast('You must be logged in.');
            return;
        }
        const loc = document.getElementById('locationInput').value.trim();
        const det = document.getElementById('detailsInput').value.trim();
        if (!loc) {
            showToast('Please enter a location');
            return;
        }
        if (!selectedLat || !selectedLng) {
            showToast('Please pin the exact location on the map (click "Pin location on map" button)');
            return;
        }

        const loadingDiv = document.getElementById('loading');
        loadingDiv.style.display = 'block';
        document.getElementById('submitBtn').disabled = true;

        try {
            let imageUrls = [];
            if (selectedImages.length > 0) {
                const uploadPromises = selectedImages.map(img => uploadToCloudinary(img.file));
                imageUrls = await Promise.all(uploadPromises);
            }

            // Fetch user name
            let userDoc = await getDoc(doc(db, 'users', currentUser.uid));
            if (!userDoc.exists()) {
                userDoc = await getDoc(doc(db, 'responders', currentUser.uid));
            }
            const submittedBy = userDoc.exists() ? userDoc.data().fullName : currentUser.displayName || currentUser.email || 'Unknown';

            await addDoc(collection(db, "floodReports"), {
                location: loc,
                latitude: selectedLat,
                longitude: selectedLng,
                details: det || 'No additional details provided.',
                timestamp: new Date(),
                userId: currentUser.uid,
                submittedBy: submittedBy,
                imageUrls: imageUrls,
                type: "flood"
            });

            navigateTo('MyReports.html');
        } catch (err) {
            console.error(err);
            showToast('Error: ' + err.message);
        } finally {
            loadingDiv.style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    // Auth
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('submitBtn').disabled = false;
        } else {
            currentUser = null;
            document.getElementById('submitBtn').disabled = true;
            showToast('Please log in to report a flood.');
        }
    });

    document.getElementById('gpsBtn').onclick = useGPS;
</script>
</body>
</html>
