<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Login – Responder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Loginresponder.css">
</head>
<body>
<div class="phone">

    <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="7" rx="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5"/><rect x="13.5" y="0" width="2.5" height="12" rx="0.5"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/><path d="M8 6c1.5 0 2.8.6 3.8 1.6l1.4-1.4A7.5 7.5 0 008 4a7.5 7.5 0 00-5.2 2.2l1.4 1.4A5.5 5.5 0 018 6z" opacity="0.7"/><path d="M8 2.5c2.5 0 4.7 1 6.3 2.6l1.4-1.4A10 10 0 008 .5a10 10 0 00-7.7 3.2l1.4 1.4A8 8 0 018 2.5z" opacity="0.4"/></svg>
            <svg width="22" height="12" viewBox="0 0 22 12" fill="white"><rect x="0" y="1" width="18" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/><rect x="1.5" y="2.5" width="13" height="7" rx="1.2" fill="white"/><path d="M19 4v4a2 2 0 000-4z"/></svg>
        </div>
    </div>

    <div class="page-title">Login</div>
    <div class="page-subtitle">Please Sign in to continue</div>

    <div class="form-card">
        <input class="input-field" id="emailInput" type="text" placeholder="Enter Email or Username">
        <input class="input-field" id="passInput" type="password" placeholder="Enter password">
        <div class="forgot-pw" onclick="alert('Password reset link sent to your email!')">Forget Password?</div>
    </div>

    <button class="login-btn" id="loginBtn">Login</button>

    <button class="guest-btn" id="guestBtn">Continue as Guest</button>

    <div style="margin-top: 16px; color: rgba(255,255,255,0.6); font-size: 13px; text-align: center;">
        Don't have an account? <span onclick="window.location.href='Signupresponder.html'" style="color: #f5900a; font-weight: 700; cursor: pointer;">Sign Up</span>
    </div>

    <div class="home-indicator"></div>
    <div class="toast" id="toast"></div>
</div>
<script>
    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(function() { t.style.opacity = '0'; }, 3500);
    }

    function markInvalid(id) {
        const el = document.getElementById(id);
        el.style.boxShadow = '0 0 0 2px #ff3b30';
        el.addEventListener('input', () => el.style.boxShadow = '', { once: true });
    }

    document.getElementById('loginBtn').onclick = function() {
        var emailOrUser = document.getElementById('emailInput').value.trim();
        var pass        = document.getElementById('passInput').value.trim();

        /* field presence checks */
        if (!emailOrUser) { showToast('⚠️ Please enter your email or username'); markInvalid('emailInput'); return; }
        if (!pass)        { showToast('⚠️ Please enter your password');           markInvalid('passInput');  return; }
        if (pass.length < 6) { showToast('⚠️ Password must be at least 6 characters'); markInvalid('passInput'); return; }

        /* look up user in localStorage */
        const users = JSON.parse(localStorage.getItem('responder_users') || '[]');
        const user  = users.find(u =>
            (u.email === emailOrUser || u.username === emailOrUser) && u.password === pass
        );

        if (!user) {
            showToast('⚠️ Incorrect email/username or password');
            markInvalid('emailInput');
            markInvalid('passInput');
            return;
        }

        /* success → go to dashboard */
        localStorage.setItem('responder_current_user', JSON.stringify(user));
        window.location.href = 'responderlogin.html';
    };

    document.getElementById('guestBtn').onclick = function() {
        window.location.href = 'responderlogin.html';
    };
</script>
</body>
</html>
