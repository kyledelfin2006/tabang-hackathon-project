<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Request Help</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="RequestHelp.css">
</head>
<body>
<div class="phone">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;flex-shrink:0;">
        <span style="color:#fff;font-size:15px;font-weight:700;">9:41</span>
        <div style="display:flex;gap:5px;align-items:center;color:#fff;font-size:12px;">
            <i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i>
        </div>
    </div>
    <div id="backBtn" style="color:#fff;font-size:18px;padding:8px 0 0 22px;cursor:pointer;"><i class="fas fa-chevron-left"></i></div>
    <div style="text-align:center;color:#fff;font-size:28px;font-weight:800;margin-top:2px;">Request Help</div>
    <div style="margin:14px 0 0;border-radius:18px;overflow:hidden;height:148px;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,0.3);">
        <img src="898e29a7d024f10f6596d065b412cb43.png" style="width:100%;height:100%;object-fit:cover;object-position:center;" alt="Helping people in Disaster">
    </div>
    <div style="height:14px;"></div>
    <div class="field-label">Name</div>
    <div class="input-box"><input type="text" id="nameInput" placeholder="Enter your name"></div>
    <div class="details-label">Phone Number</div>
    <div class="input-box"><input type="tel" id="phoneInput" placeholder="Enter your number"></div>

    <div class="image-upload-area">
        <div class="field-label">Upload Photos (Optional)</div>
        <div class="upload-box" id="uploadBox">
            <i class="fas fa-camera"></i>
            <p>Tap to take photo or select from gallery</p>
        </div>
        <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
        <div class="image-preview" id="imagePreview"></div>
        <div class="image-count" id="imageCount">0 image(s) selected</div>
    </div>

    <div class="details-label">Description</div>
    <div class="textarea-box"><textarea id="descInput" placeholder="Describe situation..."></textarea></div>
    <button class="submit-btn" id="submitBtn">Request Help</button>
    <div class="toast" id="toast"></div>
    <div class="loading" id="loading">Submitting...</div>
    <div class="bottom-nav">
        <button class="nav-item active" id="navRequest"><i class="fas fa-hand-holding-water"></i><span>Request Help</span></button>
        <button class="nav-item" id="navHotlines"><i class="fas fa-phone-alt"></i><span>Hotlines</span></button>
        <button class="nav-item" id="navReport"><i class="fas fa-exclamation-triangle"></i><span>Report Flood</span></button>
        <button class="nav-item" id="navMyReports"><i class="fas fa-clipboard-list"></i><span>All Reports</span></button>
        <button class="nav-item" id="navAccount"><i class="fas fa-user"></i><span>Account Info</span></button>
    </div>
</div>
<script type="module">
    import { db, auth } from "./firebase.js";
    import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    function navigateTo(page) { window.location.href = page; }

    document.getElementById('navRequest').onclick  = () => navigateTo('RequestHelp.html');
    document.getElementById('navHotlines').onclick = () => navigateTo('Hotline.html');
    document.getElementById('navReport').onclick   = () => navigateTo('ReportFlood.html');
    document.getElementById('navMyReports').onclick= () => navigateTo('MyReports.html');
    document.getElementById('navAccount').onclick  = () => navigateTo('AccountInfo.html');
    document.getElementById('backBtn').onclick     = () => navigateTo('Homepage.html');

    let currentUser = null;
    let selectedImages = [];
    const MAX_IMAGES = 5;
    const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB

    // Cloudinary configuration – replace with your own values
    const CLOUD_NAME = 'your_cloud_name';      // e.g., 'd1a2b3c4d'
    const UPLOAD_PRESET = 'tabang_uploads';    // your unsigned upload preset

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('submitBtn').disabled = false;
        } else {
            currentUser = null;
            document.getElementById('submitBtn').disabled = true;
            showToast('Please log in to request help.');
        }
    });

    // Image upload handling
    const uploadBox   = document.getElementById('uploadBox');
    const fileInput   = document.getElementById('fileInput');
    const imagePreview= document.getElementById('imagePreview');
    const imageCount  = document.getElementById('imageCount');

    uploadBox.onclick = () => fileInput.click();

    fileInput.onchange = function(e) {
        const files = Array.from(e.target.files);

        if (selectedImages.length + files.length > MAX_IMAGES) {
            showToast(`Maximum ${MAX_IMAGES} images allowed`);
            return;
        }

        files.forEach(file => {
            if (file.size > MAX_FILE_SIZE) {
                showToast(`File ${file.name} is too large (max 5MB)`);
                return;
            }
            if (!file.type.startsWith('image/')) {
                showToast(`File ${file.name} is not an image`);
                return;
            }
            const reader = new FileReader();
            reader.onload = function(evt) {
                selectedImages.push({
                    data: evt.target.result,
                    name: file.name,
                    type: file.type,
                    file: file
                });
                updatePreview();
            };
            reader.readAsDataURL(file);
        });

        fileInput.value = '';
    };

    function updatePreview() {
        imagePreview.innerHTML = '';
        selectedImages.forEach((img, index) => {
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = `
                <img src="${img.data}" alt="Preview">
                <div class="remove-image" onclick="removeImage(${index})">×</div>
            `;
            imagePreview.appendChild(div);
        });
        imageCount.textContent = `${selectedImages.length} image(s) selected`;
    }

    window.removeImage = function(index) {
        selectedImages.splice(index, 1);
        updatePreview();
    };

    // Helper: upload a single file to Cloudinary
    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        // Optional: add folder, tags, etc.
        // formData.append('folder', 'tabang_help_requests');

        const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

        const response = await fetch(url, {
            method: 'POST',
            body: formData
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error?.message || 'Upload failed');
        }
        const data = await response.json();
        return data.secure_url; // Cloudinary returns the secure URL
    }

    document.getElementById('submitBtn').onclick = async function() {
        if (!currentUser) {
            showToast('You must be logged in.');
            return;
        }

        const name  = document.getElementById('nameInput').value.trim();
        const phone = document.getElementById('phoneInput').value.trim();
        const desc  = document.getElementById('descInput').value.trim();

        if (!name)  { showToast('Please enter your name'); return; }
        if (!phone) { showToast('Please enter your phone number'); return; }
        if (!desc)  { showToast('Please describe your situation'); return; }

        const loadingDiv = document.getElementById('loading');
        loadingDiv.style.display = 'block';
        document.getElementById('submitBtn').disabled = true;

        try {
            let imageUrls = [];
            if (selectedImages.length > 0) {
                // Upload all images in parallel
                const uploadPromises = selectedImages.map(img => uploadToCloudinary(img.file));
                imageUrls = await Promise.all(uploadPromises);
            }

            await addDoc(collection(db, "helpRequests"), {
                name: name,
                phone: phone,
                description: desc,
                timestamp: new Date(),
                userId: currentUser.uid,
                submittedBy: currentUser.email || currentUser.displayName || name,
                imageUrls: imageUrls   // store array of Cloudinary URLs
            });
            navigateTo('MyReports.html');
        } catch (err) {
            console.error(err);
            showToast('Error: ' + err.message);
        } finally {
            loadingDiv.style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }
</script>
</body>
</html>
