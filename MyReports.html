<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>All Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Myreports.css">
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
            <i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i>
        </div>
    </div>

    <div class="back-btn" onclick="navigateTo('index.html')"><i class="fas fa-chevron-left"></i></div>
    <div class="page-title">All Reports</div>
    <div class="page-subtitle">Community flood reports & help requests</div>

    <div class="filter-row">
        <button class="filter-btn active-all" id="filterAll" onclick="setFilter('all')">
            <i class="fas fa-list"></i> All
        </button>
        <button class="filter-btn" id="filterFlood" onclick="setFilter('flood')">
            <i class="fas fa-exclamation-triangle"></i> Floods
        </button>
        <button class="filter-btn" id="filterHelp" onclick="setFilter('help')">
            <i class="fas fa-hand-holding-water"></i> Help
        </button>
    </div>

    <div class="search-wrap">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by location or name..." oninput="renderList()">
        </div>
    </div>

    <div class="scroll-area" id="reportsList"></div>

    <div class="bottom-nav">
        <button class="nav-item" id="navRequest" onclick="navigateTo('RequestHelp.html')"><i class="fas fa-hand-holding-water"></i><span>Request Help</span></button>
        <button class="nav-item" id="navHotlines" onclick="navigateTo('Hotline.html')"><i class="fas fa-phone-alt"></i><span>Hotlines</span></button>
        <button class="nav-item" id="navReport" onclick="navigateTo('ReportFlood.html')"><i class="fas fa-exclamation-triangle"></i><span>Report Flood</span></button>
        <button class="nav-item active" id="navMyReports" onclick="navigateTo('MyReports.html')"><i class="fas fa-clipboard-list"></i><span>My Reports</span></button>
        <button class="nav-item" id="navAccount" onclick="navigateTo('AccountInfo.html')"><i class="fas fa-user"></i><span>Account Info</span></button>
    </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <div class="confirm-icon"><i class="fas fa-trash-alt"></i></div>
        <div class="confirm-title" id="confirmTitle">Delete Report?</div>
        <div class="confirm-sub">This action cannot be undone. The entry will be permanently removed.</div>
        <div class="confirm-btns">
            <button class="confirm-btn btn-cancel" id="confirmCancel">Cancel</button>
            <button class="confirm-btn btn-delete" id="confirmDelete">Delete</button>
        </div>
    </div>
</div>

<script>
    function navigateTo(page) { window.location.href = page; }

    let currentFilter = 'all';
    let pendingDelete = null;

    const overlay = document.getElementById('confirmOverlay');
    document.getElementById('confirmCancel').onclick = function() {
        overlay.classList.remove('show');
        pendingDelete = null;
    };
    document.getElementById('confirmDelete').onclick = function() {
        overlay.classList.remove('show');
        if (!pendingDelete) return;
        const { id, isFlood, cardEl } = pendingDelete;
        pendingDelete = null;
        cardEl.classList.add('deleting');
        setTimeout(function() { deleteEntry(id, isFlood); }, 300);
    };

    function showConfirm(id, isFlood, cardEl) {
        pendingDelete = { id, isFlood, cardEl };
        document.getElementById('confirmTitle').textContent = isFlood ? 'Delete Report?' : 'Delete Request?';
        overlay.classList.add('show');
    }

    function deleteEntry(id, isFlood) {
        if (isFlood) {
            let reports = getMyFloodReports().filter(r => r.id !== id);
            localStorage.setItem('allReports', JSON.stringify(reports));
        } else {
            let requests = getMyHelpRequests().filter(r => r.id !== id);
            localStorage.setItem('allHelpRequests', JSON.stringify(requests));
        }
        renderList();
    }


    const otherFloodReports = [
        {
            id: 'RPT-882341',
            location: 'Barangay Tiza, Malinao, Aklan',
            details: 'Knee-deep flooding along the main road. Several houses affected.',
            timestamp: 'Mar 28, 2026, 7:30 AM',
            owner: 'Juan D.'
        },
        {
            id: 'RPT-774512',
            location: 'New Washington, Aklan',
            details: 'Flash flood near the river bank. Residents evacuating.',
            timestamp: 'Mar 28, 2026, 9:10 AM',
            owner: 'Maria S.'
        },
        {
            id: 'RPT-663290',
            location: 'Kalibo Proper, Aklan',
            details: 'Flooding at the public market area. Streets impassable.',
            timestamp: 'Mar 29, 2026, 6:00 AM',
            owner: 'Rodel A.'
        }
    ];

    const otherHelpRequests = [
        {
            id: 'HLP-991234',
            name: 'Ana Reyes',
            phone: '09171234567',
            description: 'Family of 5 stranded on rooftop. Need rescue immediately.',
            timestamp: 'Mar 28, 2026, 8:45 AM',
            owner: 'Ana R.'
        },
        {
            id: 'HLP-885671',
            name: 'Angel Ilio',
            phone: '09281234567',
            description: 'Elderly person needs medical attention. Cannot evacuate alone.',
            timestamp: 'Mar 29, 2026, 7:15 AM',
            owner: 'Bernardo C.'
        }
    ];

    function getMyFloodReports() {
        try { return JSON.parse(localStorage.getItem('allReports') || '[]'); } catch(e) { return []; }
    }
    function getMyHelpRequests() {
        try { return JSON.parse(localStorage.getItem('allHelpRequests') || '[]'); } catch(e) { return []; }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(timestamp) {
        if (!timestamp) return '—';
        const date = new Date(timestamp);
        if (!isNaN(date.getTime())) {
            return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }
        return timestamp.split(',').slice(0, 2).join(',').trim();
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.getElementById('filterAll').className = 'filter-btn' + (filter === 'all' ? ' active-all' : '');
        document.getElementById('filterFlood').className = 'filter-btn' + (filter === 'flood' ? ' active-flood' : '');
        document.getElementById('filterHelp').className = 'filter-btn' + (filter === 'help' ? ' active-help' : '');
        renderList();
    }

    function renderList() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('reportsList');

        let floodItems = [
            ...otherFloodReports.map(r => ({ ...r, isOwn: false })),
            ...getMyFloodReports().map(r => ({ ...r, isOwn: true, owner: 'You' }))
        ].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        let helpItems = [
            ...otherHelpRequests.map(r => ({ ...r, isOwn: false })),
            ...getMyHelpRequests().map(r => ({ ...r, isOwn: true, owner: 'You' }))
        ].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        let combined = [];
        if (currentFilter === 'all' || currentFilter === 'flood') {
            combined = combined.concat(floodItems.map(r => ({ ...r, type: 'flood' })));
        }
        if (currentFilter === 'all' || currentFilter === 'help') {
            combined = combined.concat(helpItems.map(r => ({ ...r, type: 'help' })));
        }

        combined.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        if (query) {
            combined = combined.filter(r => {
                const searchable = [r.location || '', r.name || '', r.description || '', r.details || '', r.owner || ''].join(' ').toLowerCase();
                return searchable.includes(query);
            });
        }

        if (combined.length === 0) {
            list.innerHTML =
                '<div class="empty-state">' +
                '<div class="empty-icon"><i class="fas fa-search"></i></div>' +
                '<div class="empty-title">No Reports Found</div>' +
                '<div class="empty-sub">No community reports match your current filter or search.</div>' +
                '</div>';
            return;
        }

        let html = '<div class="list-count">' + combined.length + ' Report' + (combined.length !== 1 ? 's' : '') + '</div>';

        combined.forEach(function(r, idx) {
            const delay = (idx * 0.06).toFixed(2) + 's';
            const isHelp = r.type === 'help';
            const cardClass = 'report-card' + (isHelp ? ' help-card' : '') + (r.isOwn ? ' own-card' : '');
            const idClass = isHelp ? 'card-id help-id' : 'card-id';
            const dividerClass = isHelp ? 'card-divider help-divider' : 'card-divider';
            const iconClass = isHelp ? 'row-icon help-row-icon' : 'row-icon';
            const badgeHtml = isHelp
                ? '<span class="badge badge-emergency"><i class="fas fa-ambulance"></i> Emergency</span>'
                : '<span class="badge badge-priority"><i class="fas fa-flag"></i> High Priority</span>';
            const ownerBadge = r.isOwn
                ? '<span class="user-badge badge-you"><i class="fas fa-user"></i> You</span>'
                : '<span class="user-badge badge-other"><i class="fas fa-user"></i> ' + escapeHtml(r.owner || 'Other') + '</span>';

            const deleteBtn = r.isOwn
                ? '<button class="card-delete-btn" data-id="' + escapeHtml(r.id) + '" data-isflood="' + (!isHelp) + '" title="Delete"><i class="fas fa-trash-alt"></i></button>'
                : '';

            if (!isHelp) {
                html +=
                    '<div class="' + cardClass + '" style="animation-delay:' + delay + '" data-id="' + escapeHtml(r.id) + '">' +
                    '<div class="card-top">' +
                    '<div class="' + idClass + '"><i class="fas fa-hashtag"></i> ' + escapeHtml(r.id || '—') + '</div>' +
                    ownerBadge +
                    deleteBtn +
                    '</div>' +
                    '<div class="' + dividerClass + '"></div>' +
                    '<div class="card-row"><i class="fas fa-map-marker-alt ' + iconClass + '"></i><div><div class="row-label">Location</div><div class="row-val">' + escapeHtml(r.location || '—') + '</div></div></div>' +
                    (r.details && r.details !== 'No additional details provided.' ? '<div class="card-row"><i class="fas fa-info-circle ' + iconClass + '"></i><div><div class="row-label">Details</div><div class="row-val">' + escapeHtml(r.details) + '</div></div></div>' : '') +
                    '<div class="card-row"><i class="fas fa-clock ' + iconClass + '"></i><div><div class="row-label">Submitted</div><div class="row-val">' + escapeHtml(formatDate(r.timestamp)) + '</div></div></div>' +
                    '<div class="card-footer">' + badgeHtml + '<span class="card-assigned"><i class="fas fa-shield-alt"></i> MDRRMO Aklan</span></div>' +
                    '</div>';
            } else {
                html +=
                    '<div class="' + cardClass + '" style="animation-delay:' + delay + '" data-id="' + escapeHtml(r.id) + '">' +
                    '<div class="card-top">' +
                    '<div class="' + idClass + '"><i class="fas fa-hashtag"></i> ' + escapeHtml(r.id || '—') + '</div>' +
                    ownerBadge +
                    deleteBtn +
                    '</div>' +
                    '<div class="' + dividerClass + '"></div>' +
                    '<div class="card-row"><i class="fas fa-user ' + iconClass + '"></i><div><div class="row-label">Name</div><div class="row-val">' + escapeHtml(r.name || '—') + '</div></div></div>' +
                    '<div class="card-row"><i class="fas fa-comment-alt ' + iconClass + '"></i><div><div class="row-label">Situation</div><div class="row-val">' + escapeHtml(r.description || '—') + '</div></div></div>' +
                    '<div class="card-row"><i class="fas fa-clock ' + iconClass + '"></i><div><div class="row-label">Submitted</div><div class="row-val">' + escapeHtml(formatDate(r.timestamp)) + '</div></div></div>' +
                    '<div class="card-footer">' + badgeHtml + '<span class="card-assigned"><i class="fas fa-shield-alt"></i> MDRRMO Aklan</span></div>' +
                    '</div>';
            }
        });

        html += '<div style="height:14px;"></div>';
        list.innerHTML = html;

        list.querySelectorAll('.card-delete-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const isFlood = btn.getAttribute('data-isflood') === 'true';
                const cardEl = btn.closest('.report-card');
                showConfirm(id, isFlood, cardEl);
            });
        });
    }

    window.addEventListener('load', renderList);
</script>
</body>
</html>
