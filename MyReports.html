<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>All Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS & JS for map preview -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="css/Myreports.css">
    <style>
        /* ── Responder status badge (read-only, user side) ── */
        .responder-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 7px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            pointer-events: none; /* not clickable */
            user-select: none;
        }
        .badge-responded {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.35);
        }
        .badge-responding {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            box-shadow: 0 2px 10px rgba(245, 158, 11, 0.35);
        }

        /* ── "Mark as Responded" button — shown to the reporter when status = 'responding' ── */
        .mark-responded-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 2px 14px rgba(16, 185, 129, 0.45);
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            animation: pulse-green 2s infinite;
        }
        .mark-responded-btn:hover {
            background: linear-gradient(135deg, #34d399, #10b981);
            box-shadow: 0 4px 18px rgba(16, 185, 129, 0.6);
            transform: translateY(-1px);
            animation: none;
        }
        .mark-responded-btn:active {
            transform: translateY(0);
        }
        .mark-responded-btn:disabled {
            opacity: 0.6;
            cursor: default;
            transform: none;
            animation: none;
        }

        /* ── Responder action box — container shown when a responder is on the way ── */
        .responder-action-box {
            margin-top: 12px;
            background: rgba(245, 158, 11, 0.10);
            border: 1px solid rgba(245, 158, 11, 0.30);
            border-radius: 14px;
            padding: 12px 14px;
        }
        .responder-action-box .action-hint {
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .responder-action-box .action-hint i {
            color: #f59e0b;
        }
        .responder-action-box .action-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        @keyframes pulse-green {
            0%   { box-shadow: 0 2px 14px rgba(16,185,129,0.45); }
            50%  { box-shadow: 0 2px 22px rgba(16,185,129,0.75); }
            100% { box-shadow: 0 2px 14px rgba(16,185,129,0.45); }
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
            <i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i>
        </div>
    </div>

    <div class="back-btn" onclick="navigateTo('Homepage.html')"><i class="fas fa-chevron-left"></i></div>
    <div class="page-title">All Reports</div>
    <div class="page-subtitle">Community flood reports & help requests</div>

    <div class="filter-row">
        <button class="filter-btn active-all" id="filterAll" onclick="setFilter('all')">
            <i class="fas fa-list"></i> All
        </button>
        <button class="filter-btn" id="filterFlood" onclick="setFilter('flood')">
            <i class="fas fa-exclamation-triangle"></i> Floods
        </button>
        <button class="filter-btn" id="filterHelp" onclick="setFilter('help')">
            <i class="fas fa-hand-holding-water"></i> Help
        </button>
    </div>

    <div class="search-wrap">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by location or name..." oninput="renderList()">
        </div>
    </div>

    <div class="scroll-area" id="reportsList"></div>

    <div class="bottom-nav">
        <button class="nav-item" id="navRequest" onclick="navigateTo('RequestHelp.html')"><i class="fas fa-hand-holding-water"></i><span>Request Help</span></button>
        <button class="nav-item" id="navHotlines" onclick="navigateTo('Hotline.html')"><i class="fas fa-phone-alt"></i><span>Hotlines</span></button>
        <button class="nav-item" id="navReport" onclick="navigateTo('ReportFlood.html')"><i class="fas fa-exclamation-triangle"></i><span>Report Flood</span></button>
        <button class="nav-item active" id="navMyReports" onclick="navigateTo('MyReports.html')"><i class="fas fa-clipboard-list"></i><span>All Reports</span></button>
        <button class="nav-item" id="navAccount" onclick="navigateTo('AccountInfo.html')"><i class="fas fa-user"></i><span>Account Info</span></button>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <div class="confirm-icon"><i class="fas fa-trash-alt"></i></div>
        <div class="confirm-title" id="confirmTitle">Delete Report?</div>
        <div class="confirm-sub">This action cannot be undone. The entry will be permanently removed.</div>
        <div class="confirm-btns">
            <button class="confirm-btn btn-cancel" id="confirmCancel">Cancel</button>
            <button class="confirm-btn btn-delete" id="confirmDelete">Delete</button>
        </div>
    </div>
</div>

<!-- Image Preview Modal -->
<div id="imagePreview" class="image-preview">
    <span class="close-btn" onclick="closeImagePreview()">&times;</span>
    <img id="previewImg" class="preview-img">
</div>

<!-- Map Preview Modal -->
<div id="mapPreviewModal" class="map-preview-modal">
    <div class="map-preview-content">
        <div class="map-preview-header">
            <span><i class="fas fa-map-pin"></i> Incident Location</span>
            <button onclick="closeMapPreview()">&times;</button>
        </div>
        <div id="previewMap"></div>
    </div>
</div>

<script type="module" src="JS/MyReports.js"></script>
</body>
</html>
