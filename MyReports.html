<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>All Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Myreports.css">
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
            <i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i>
        </div>
    </div>

    <div class="back-btn" onclick="navigateTo('Homepage.html')"><i class="fas fa-chevron-left"></i></div>
    <div class="page-title">All Reports</div>
    <div class="page-subtitle">Community flood reports & help requests</div>

    <div class="filter-row">
        <button class="filter-btn active-all" id="filterAll" onclick="setFilter('all')">
            <i class="fas fa-list"></i> All
        </button>
        <button class="filter-btn" id="filterFlood" onclick="setFilter('flood')">
            <i class="fas fa-exclamation-triangle"></i> Floods
        </button>
        <button class="filter-btn" id="filterHelp" onclick="setFilter('help')">
            <i class="fas fa-hand-holding-water"></i> Help
        </button>
    </div>

    <div class="search-wrap">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by location or name..." oninput="renderList()">
        </div>
    </div>

    <div class="scroll-area" id="reportsList"></div>

    <div class="bottom-nav">
        <button class="nav-item" id="navRequest" onclick="navigateTo('RequestHelp.html')"><i class="fas fa-hand-holding-water"></i><span>Request Help</span></button>
        <button class="nav-item" id="navHotlines" onclick="navigateTo('Hotline.html')"><i class="fas fa-phone-alt"></i><span>Hotlines</span></button>
        <button class="nav-item" id="navReport" onclick="navigateTo('ReportFlood.html')"><i class="fas fa-exclamation-triangle"></i><span>Report Flood</span></button>
        <button class="nav-item active" id="navMyReports" onclick="navigateTo('MyReports.html')"><i class="fas fa-clipboard-list"></i><span>My Reports</span></button>
        <button class="nav-item" id="navAccount" onclick="navigateTo('AccountInfo.html')"><i class="fas fa-user"></i><span>Account Info</span></button>
    </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <div class="confirm-icon"><i class="fas fa-trash-alt"></i></div>
        <div class="confirm-title" id="confirmTitle">Delete Report?</div>
        <div class="confirm-sub">This action cannot be undone. The entry will be permanently removed.</div>
        <div class="confirm-btns">
            <button class="confirm-btn btn-cancel" id="confirmCancel">Cancel</button>
            <button class="confirm-btn btn-delete" id="confirmDelete">Delete</button>
        </div>
    </div>
</div>
<script type="module">
    import { db, auth } from "./firebase.js";
    import { collection, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    function navigateTo(page) { window.location.href = page; }

    let currentFilter = 'all';
    let pendingDelete = null;
    const overlay = document.getElementById('confirmOverlay');
    let currentUser = null;

    const filterBtns = document.querySelectorAll('.filter-btn');
    const searchInput = document.getElementById('searchInput');

    // ---------- Helper functions ----------
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function toDate(timestamp) {
        if (!timestamp) return null;
        if (timestamp.toDate) return timestamp.toDate(); // Firestore Timestamp
        const d = new Date(timestamp);
        return isNaN(d.getTime()) ? null : d;
    }

    function formatDate(timestamp) {
        const date = toDate(timestamp);
        if (!date) return '—';
        return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    // ---------- Authentication ----------
    onAuthStateChanged(auth, (user) => {
        const listDiv = document.getElementById('reportsList');
        if (!user) {
            currentUser = null;
            listDiv.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i class="fas fa-lock"></i></div>
                    <div class="empty-title">Please Log In</div>
                    <div class="empty-sub">You need to be logged in to view your reports.</div>
                    <button class="login-prompt-btn" onclick="navigateTo('Login.html')" style="margin-top:16px; padding:10px 24px; background:#1B3D87; color:white; border:none; border-radius:50px; font-weight:600; cursor:pointer;">Log In</button>
                </div>`;
            filterBtns.forEach(btn => btn.disabled = true);
            if (searchInput) searchInput.disabled = true;
            return;
        }

        currentUser = user;
        filterBtns.forEach(btn => btn.disabled = false);
        if (searchInput) searchInput.disabled = false;
        renderList();
    });

    // ---------- Delete confirmation ----------
    document.getElementById('confirmCancel').onclick = () => {
        overlay.classList.remove('show');
        pendingDelete = null;
    };
    document.getElementById('confirmDelete').onclick = () => {
        overlay.classList.remove('show');
        if (!pendingDelete) return;
        const { id, isFlood, cardEl } = pendingDelete;
        pendingDelete = null;
        cardEl.classList.add('deleting');
        setTimeout(() => deleteEntry(id, isFlood), 300);
    };

    function showConfirm(id, isFlood, cardEl) {
        pendingDelete = { id, isFlood, cardEl };
        document.getElementById('confirmTitle').textContent = isFlood ? 'Delete Report?' : 'Delete Request?';
        overlay.classList.add('show');
    }

    async function deleteEntry(id, isFlood) {
        const collectionName = isFlood ? "floodReports" : "helpRequests";
        await deleteDoc(doc(db, collectionName, id));
        renderList();
    }

    // ---------- Fetch user's reports ----------
    async function getMyFloodReports() {
        if (!currentUser) return [];
        const q = query(collection(db, "floodReports"), where("userId", "==", currentUser.uid));
        const snap = await getDocs(q);
        return snap.docs.map(d => ({ ...d.data(), id: d.id, type: 'flood' }));
    }

    async function getMyHelpRequests() {
        if (!currentUser) return [];
        const q = query(collection(db, "helpRequests"), where("userId", "==", currentUser.uid));
        const snap = await getDocs(q);
        return snap.docs.map(d => ({ ...d.data(), id: d.id, type: 'help' }));
    }

    // ---------- Filter & search ----------
    function setFilter(filter) {
        if (!currentUser) return;
        currentFilter = filter;
        ['All', 'Flood', 'Help'].forEach(type => {
            const btn = document.getElementById('filter' + type);
            btn.className = 'filter-btn' + (type.toLowerCase() === filter ? ` active-${filter}` : '');
        });
        renderList();
    }

    // ---------- Render the list of reports ----------
    async function renderList() {
        if (!currentUser) return;

        const queryStr = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('reportsList');

        list.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;">Loading...</div>';

        const floods = await getMyFloodReports();
        const helps = await getMyHelpRequests();

        let items = [
            ...floods.map(r => ({ ...r, owner: r.submittedBy || 'Unknown' })),
            ...helps.map(r => ({ ...r, owner: r.submittedBy || 'Unknown' }))
        ];

        // Apply filter
        if (currentFilter === 'flood') items = items.filter(i => i.type === 'flood');
        if (currentFilter === 'help')  items = items.filter(i => i.type === 'help');

        // Apply search
        if (queryStr) {
            items = items.filter(r => {
                const searchable = [r.location||'', r.name||'', r.description||'', r.details||'', r.owner||''].join(' ').toLowerCase();
                return searchable.includes(queryStr);
            });
        }

        // Sort by date (newest first)
        items.sort((a, b) => {
            const dateA = toDate(a.timestamp) || new Date(0);
            const dateB = toDate(b.timestamp) || new Date(0);
            return dateB - dateA;
        });

        if (items.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i class="fas fa-search"></i></div>
                    <div class="empty-title">No Reports Found</div>
                    <div class="empty-sub">No reports match your current filter or search.</div>
                </div>`;
            return;
        }

        let html = `<div class="list-count">${items.length} Report${items.length !== 1 ? 's' : ''}</div>`;

        items.forEach((r, idx) => {
            const isHelp = r.type === 'help';
            const cardClass = `report-card${isHelp ? ' help-card' : ''} own-card`;
            const dividerClass = isHelp ? 'card-divider help-divider' : 'card-divider';
            const iconClass = isHelp ? 'row-icon help-row-icon' : 'row-icon';

            // Badge
            const badgeHtml = isHelp
                ? '<span class="badge badge-emergency"><i class="fas fa-ambulance"></i> Emergency Request</span>'
                : '<span class="badge badge-priority"><i class="fas fa-flag"></i> Flood Report</span>';

            // Owner badge
            const ownerBadge = `<span class="user-badge badge-you"><i class="fas fa-user"></i> ${escapeHtml(r.owner)}</span>`;

            // Delete button
            const deleteBtn = `<button class="card-delete-btn" data-id="${escapeHtml(r.id)}" data-isflood="${r.type === 'flood'}" title="Delete"><i class="fas fa-trash-alt"></i></button>`;

            // Row items
            let rows = '';
            if (isHelp) {
                rows = `
                    <div class="card-row">
                        <i class="fas fa-user ${iconClass}"></i>
                        <div>
                            <div class="row-label">Name</div>
                            <div class="row-val">${escapeHtml(r.name || '—')}</div>
                        </div>
                    </div>
                    <div class="card-row">
                        <i class="fas fa-phone ${iconClass}"></i>
                        <div>
                            <div class="row-label">Phone</div>
                            <div class="row-val">${escapeHtml(r.phone || '—')}</div>
                        </div>
                    </div>
                    <div class="card-row">
                        <i class="fas fa-comment-alt ${iconClass}"></i>
                        <div>
                            <div class="row-label">Situation</div>
                            <div class="row-val">${escapeHtml(r.description || '—')}</div>
                        </div>
                    </div>`;
            } else {
                rows = `
                    <div class="card-row">
                        <i class="fas fa-map-marker-alt ${iconClass}"></i>
                        <div>
                            <div class="row-label">Location</div>
                            <div class="row-val">${escapeHtml(r.location || '—')}</div>
                        </div>
                    </div>
                    <div class="card-row">
                        <i class="fas fa-info-circle ${iconClass}"></i>
                        <div>
                            <div class="row-label">Details</div>
                            <div class="row-val">${escapeHtml(r.details || '—')}</div>
                        </div>
                    </div>`;
            }

            // Date row (common)
            rows += `
                <div class="card-row">
                    <i class="fas fa-clock ${iconClass}"></i>
                    <div>
                        <div class="row-label">Submitted</div>
                        <div class="row-val">${escapeHtml(formatDate(r.timestamp))}</div>
                    </div>
                </div>`;

            // Build the card
            html += `
                <div class="${cardClass}" data-id="${escapeHtml(r.id)}">
                    <div class="card-top" style="display:flex; justify-content:space-between; align-items:center;">
                        ${ownerBadge}
                        ${deleteBtn}
                    </div>
                    <div class="${dividerClass}"></div>
                    ${rows}
                    <div class="card-footer">${badgeHtml}<span class="card-assigned"><i class="fas fa-shield-alt"></i> MDRRMO Aklan</span></div>
                </div>`;
        });

        html += '<div style="height:14px;"></div>';
        list.innerHTML = html;

        // Attach delete button event listeners
        list.querySelectorAll('.card-delete-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const isFlood = btn.getAttribute('data-isflood') === 'true';
                const cardEl = btn.closest('.report-card');
                showConfirm(id, isFlood, cardEl);
            });
        });
    }

    // Expose functions for inline onclick handlers
    window.navigateTo = navigateTo;
    window.setFilter = setFilter;
</script>
</body>
</html>
