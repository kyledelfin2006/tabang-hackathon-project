<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>All Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Myreports.css">
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
            <i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i>
        </div>
    </div>

    <div class="back-btn" onclick="navigateTo('index.html')"><i class="fas fa-chevron-left"></i></div>
    <div class="page-title">All Reports</div>
    <div class="page-subtitle">Community flood reports & help requests</div>

    <div class="filter-row">
        <button class="filter-btn active-all" id="filterAll" onclick="setFilter('all')">
            <i class="fas fa-list"></i> All
        </button>
        <button class="filter-btn" id="filterFlood" onclick="setFilter('flood')">
            <i class="fas fa-exclamation-triangle"></i> Floods
        </button>
        <button class="filter-btn" id="filterHelp" onclick="setFilter('help')">
            <i class="fas fa-hand-holding-water"></i> Help
        </button>
    </div>

    <div class="search-wrap">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by location or name..." oninput="renderList()">
        </div>
    </div>

    <div class="scroll-area" id="reportsList"></div>

    <div class="bottom-nav">
        <button class="nav-item" id="navRequest" onclick="navigateTo('RequestHelp.html')"><i class="fas fa-hand-holding-water"></i><span>Request Help</span></button>
        <button class="nav-item" id="navHotlines" onclick="navigateTo('Hotline.html')"><i class="fas fa-phone-alt"></i><span>Hotlines</span></button>
        <button class="nav-item" id="navReport" onclick="navigateTo('ReportFlood.html')"><i class="fas fa-exclamation-triangle"></i><span>Report Flood</span></button>
        <button class="nav-item active" id="navMyReports" onclick="navigateTo('MyReports.html')"><i class="fas fa-clipboard-list"></i><span>My Reports</span></button>
        <button class="nav-item" id="navAccount" onclick="navigateTo('AccountInfo.html')"><i class="fas fa-user"></i><span>Account Info</span></button>
    </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <div class="confirm-icon"><i class="fas fa-trash-alt"></i></div>
        <div class="confirm-title" id="confirmTitle">Delete Report?</div>
        <div class="confirm-sub">This action cannot be undone. The entry will be permanently removed.</div>
        <div class="confirm-btns">
            <button class="confirm-btn btn-cancel" id="confirmCancel">Cancel</button>
            <button class="confirm-btn btn-delete" id="confirmDelete">Delete</button>
        </div>
    </div>
</div>

<script> // Kyle Reviewed! : Yes

 function navigateTo(page) { window.location.href = page; }

if (!localStorage.getItem('allReports')) localStorage.setItem('allReports', JSON.stringify([]));
if (!localStorage.getItem('allHelpRequests')) localStorage.setItem('allHelpRequests', JSON.stringify([]));

let currentFilter = 'all';
let pendingDelete = null;
const overlay = document.getElementById('confirmOverlay');

document.getElementById('confirmCancel').onclick = function() {
    overlay.classList.remove('show');
    pendingDelete = null;
};

document.getElementById('confirmDelete').onclick = function() {
    overlay.classList.remove('show');
    if (!pendingDelete) return;
    const { id, isFlood, cardEl } = pendingDelete;
    pendingDelete = null;
    cardEl.classList.add('deleting');
    setTimeout(() => { deleteEntry(id, isFlood); }, 300);
};

function showConfirm(id, isFlood, cardEl) {
    pendingDelete = { id, isFlood, cardEl };
    document.getElementById('confirmTitle').textContent = isFlood ? 'Delete Report?' : 'Delete Request?';
    overlay.classList.add('show');
}

function deleteEntry(id, isFlood) {
    if (isFlood) {
        let reports = getMyFloodReports().filter(r => r.id !== id);
        localStorage.setItem('allReports', JSON.stringify(reports));
    } else {
        let requests = getMyHelpRequests().filter(r => r.id !== id);
        localStorage.setItem('allHelpRequests', JSON.stringify(requests));
    }
    renderList();
}

function getMyFloodReports() {
    try { return JSON.parse(localStorage.getItem('allReports') || '[]'); }
    catch(e) { return []; }
}

function getMyHelpRequests() {
    try { return JSON.parse(localStorage.getItem('allHelpRequests') || '[]'); }
    catch(e) { return []; }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatDate(timestamp) {
    if (!timestamp) return '—';
    const date = new Date(timestamp);
    if (!isNaN(date.getTime())) {
        return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }
    return timestamp.split(',').slice(0, 2).join(',').trim();
}

function setFilter(filter) {
    currentFilter = filter;
    ['All', 'Flood', 'Help'].forEach(type => {
        const btn = document.getElementById('filter' + type);
        btn.className = 'filter-btn' + (type.toLowerCase() === filter ? ` active-${filter}` : '');
    });
    renderList();
}

function seedDemoData() {
    if (localStorage.getItem('demoSeeded')) return;
    localStorage.setItem('demoSeeded', 'true');

    // Only add demo data on top of existing — don't overwrite
    const existingReports = getMyFloodReports();
    const existingHelp = getMyHelpRequests();

    const demoReports = [
        {
            id: 'DEMO-001', isDemo: true,
            location: 'Brgy. Poblacion, Ibajay, Aklan',
            details: 'Water level rising near the bridge, approximately knee-deep.',
            timestamp: 'Mar 29, 2026, 7:45 AM',
            submittedBy: 'Risa Hontiveros'
        },
        {
            id: 'DEMO-002', isDemo: true,
            location: 'Brgy. Ondoy, Kalibo, Aklan',
            details: 'Road is impassable. Several houses flooded.',
            timestamp: 'Mar 29, 2026, 8:10 AM',
            submittedBy: 'Kobe Bryant'
        },
        {
            id: 'DEMO-003', isDemo: true,
            location: 'Brgy. Poblacion, Numancia, Aklan',
            details: 'Flooding near the elementary school.',
            timestamp: 'Mar 29, 2026, 9:00 AM',
            submittedBy: 'Lebron James'
        }
    ];

    const demoHelp = [
        {
            id: 'DEMO-001', isDemo: true,
            name: 'Kai Sotto',
            phone: '09171234567',
            description: 'Elderly resident trapped at home, needs evacuation assistance.',
            timestamp: 'Mar 29, 2026, 8:30 AM',
            submittedBy: 'Kai Sotto'
        },
        {
            id: 'DEMO-002', isDemo: true,
            name: 'Dwight Ramos',
            phone: '09281234567',
            description: 'Family of 5 stranded on rooftop, needs immediate rescue.',
            timestamp: 'Mar 29, 2026, 9:15 AM',
            submittedBy: 'Dwight Ramos'
        }
    ];

    // Merge demo data with any existing real data
    localStorage.setItem('allReports', JSON.stringify([...existingReports, ...demoReports]));
    localStorage.setItem('allHelpRequests', JSON.stringify([...existingHelp, ...demoHelp]));
}

function renderList() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('reportsList');

    let items = [
        ...getMyFloodReports().map(r => ({ ...r, type: 'flood', owner: r.submittedBy || 'You' })),
        ...getMyHelpRequests().map(r => ({ ...r, type: 'help', owner: r.submittedBy || 'You' }))
    ];

    if (currentFilter === 'flood') items = items.filter(i => i.type === 'flood');
    if (currentFilter === 'help')  items = items.filter(i => i.type === 'help');

    if (query) {
        items = items.filter(r => {
            const searchable = [r.location||'', r.name||'', r.description||'', r.details||'', r.owner||''].join(' ').toLowerCase();
            return searchable.includes(query);
        });
    }

    items.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    if (items.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon"><i class="fas fa-search"></i></div>
                <div class="empty-title">No Reports Found</div>
                <div class="empty-sub">No reports match your current filter or search.</div>
            </div>`;
        return;
    }

    let html = `<div class="list-count">${items.length} Report${items.length !== 1 ? 's' : ''}</div>`;

    items.forEach((r, idx) => {
        const delay = (idx * 0.06).toFixed(2) + 's';
        const isHelp = r.type === 'help';
        const cardClass = `report-card${isHelp ? ' help-card' : ''} own-card`;
        const dividerClass = isHelp ? 'card-divider help-divider' : 'card-divider';
        const iconClass = isHelp ? 'row-icon help-row-icon' : 'row-icon';
        const badgeHtml = isHelp
            ? '<span class="badge badge-emergency"><i class="fas fa-ambulance"></i> Emergency</span>'
            : '<span class="badge badge-priority"><i class="fas fa-flag"></i> High Priority</span>';

        const demoBadge = r.isDemo
            ? `<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.15);letter-spacing:0.6px;text-transform:uppercase;">DEMO</span>`
            : '';

        const ownerBadge = `<span class="user-badge badge-you"><i class="fas fa-user"></i> ${escapeHtml(r.owner)}</span>`;
        const deleteBtn = `<button class="card-delete-btn" data-id="${escapeHtml(r.id)}" data-isflood="${r.type === 'flood'}" title="Delete"><i class="fas fa-trash-alt"></i></button>`;

        html += `
        <div class="${cardClass}" style="animation-delay:${delay}" data-id="${escapeHtml(r.id)}">
            <div class="card-top" style="flex-direction:column;gap:8px;">
                <div style="display:flex;align-items:center;gap:6px;">
                    ${ownerBadge}
                    ${demoBadge}
                </div>
                <div style="display:flex;justify-content:flex-end;">${deleteBtn}</div>
            </div>
            <div class="${dividerClass}"></div>
            ${isHelp
            ? `<div class="card-row"><i class="fas fa-user ${iconClass}"></i><div><div class="row-label">Name</div><div class="row-val">${escapeHtml(r.name || '—')}</div></div></div>
                   <div class="card-row"><i class="fas fa-comment-alt ${iconClass}"></i><div><div class="row-label">Situation</div><div class="row-val">${escapeHtml(r.description || '—')}</div></div></div>`
            : `<div class="card-row"><i class="fas fa-map-marker-alt ${iconClass}"></i><div><div class="row-label">Location</div><div class="row-val">${escapeHtml(r.location || '—')}</div></div></div>
                   ${r.details ? `<div class="card-row"><i class="fas fa-info-circle ${iconClass}"></i><div><div class="row-label">Details</div><div class="row-val">${escapeHtml(r.details)}</div></div></div>` : ''}`
        }
            <div class="card-row"><i class="fas fa-clock ${iconClass}"></i><div><div class="row-label">Submitted</div><div class="row-val">${escapeHtml(formatDate(r.timestamp))}</div></div></div>
            <div class="card-footer">${badgeHtml}<span class="card-assigned"><i class="fas fa-shield-alt"></i> MDRRMO Aklan</span></div>
        </div>`;
    });

    html += '<div style="height:14px;"></div>';
    list.innerHTML = html;

    list.querySelectorAll('.card-delete-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const id = btn.getAttribute('data-id');
            const isFlood = btn.getAttribute('data-isflood') === 'true';
            const cardEl = btn.closest('.report-card');
            showConfirm(id, isFlood, cardEl);
        });
    });
}

// Single load entry point
window.addEventListener('load', function() {
    seedDemoData();
    renderList();
});
</script>
</body>
</html>
