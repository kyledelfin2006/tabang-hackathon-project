<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="css/responderlogin.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <title>All Reports | Tabang Responder</title>
    <style>
        .card-actions {
            margin-top: 12px;
            text-align: right;
        }
        .respond-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .respond-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }
        .respond-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .respond-btn {
            padding: 10px 16px;
        }
        .respond-btn {
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn-respond {
            background: #ef4444;
        }
        .btn-respond:hover {
            background: #dc2626;
        }

        .btn-responding {
            background: #f59e0b;
        }
        .btn-responding:hover {
            background: #d97706;
        }

        .btn-resolved {
            background: #10b981;
            cursor: default;
            opacity: 0.7;
        }
        .btn-resolved:hover {
            background: #10b981;
        }

        /* ── Image Gallery ── */
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .gallery-thumb {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.15s, border-color 0.15s;
        }
        .gallery-thumb:hover {
            transform: scale(1.05);
            border-color: rgba(255,107,107,0.6);
        }
        .gallery-more {
            width: 72px;
            height: 72px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* ── Full-screen Image Preview Modal ── */
        .image-preview {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.92);
            align-items: center;
            justify-content: center;
        }
        .image-preview .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 32px;
            color: #fff;
            cursor: pointer;
            line-height: 1;
            opacity: 0.8;
        }
        .image-preview .close-btn:hover {
            opacity: 1;
        }
        .preview-img {
            max-width: 92vw;
            max-height: 88vh;
            border-radius: 10px;
            object-fit: contain;
            cursor: zoom-in;
            transition: transform 0.25s ease;
        }
        .preview-img.zoomed {
            transform: scale(1.9);
            cursor: zoom-out;
        }
    </style>
</head>
<body>
<div class="responder-dashboard">
    <div class="aurora-bg"></div>

    <div class="view-panel active" id="viewReports">
        <div class="panel-header" style="padding-top:20px;">
            <button class="back-btn" onclick="window.location.href='responderhomepage.html'">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                Back
            </button>

            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div>
                    <div class="panel-title">All Reports</div>
                    <div class="panel-subtitle">View &amp; comment on community reports</div>
                </div>
                <div style="background:rgba(255,107,107,0.15);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3);padding:3px 12px;border-radius:30px;font-size:11px;font-weight:700;margin-top:4px;">LIVE</div>
            </div>
        </div>
        <div class="filter-row" style="margin-top:10px;">
            <button class="filter-pill active" id="repFilterAll" onclick="setRepFilter('all',this)">All</button>
            <button class="filter-pill" id="repFilterFlood" onclick="setRepFilter('flood',this)">🌊 Floods</button>
            <button class="filter-pill" id="repFilterHelp" onclick="setRepFilter('help',this)">🆘 Help</button>
        </div>
        <div class="search-wrap">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="repSearch" placeholder="Search reports..." oninput="renderFloodReports()">
            </div>
        </div>
        <div class="panel-scroll" id="reportsList">
            <div class="panel-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading reports...</div>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="imagePreview" class="image-preview">
        <span class="close-btn" onclick="closeImagePreview()">&times;</span>
        <img id="previewImg" class="preview-img" alt="Report image">
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='responderhotline.html'">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.6 3.38 2 2 0 0 1 3.57 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.54a16 16 0 0 0 5.55 5.55l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/>
                </svg>
            </div>
            <span>Hotlines</span>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </div>
            <span>All Reports</span>
        </div>
        <div class="nav-item" onclick="window.location.href='AccountInformation.html'">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <span>Account</span>
        </div>
    </nav>

    <script type="module" src="JS/AllReports.js"></script>
</div>
</body>
</html>
