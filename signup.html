<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
<div class="phone">

    <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="7" rx="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5"/><rect x="13.5" y="0" width="2.5" height="12" rx="0.5"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/><path d="M8 6c1.5 0 2.8.6 3.8 1.6l1.4-1.4A7.5 7.5 0 008 4a7.5 7.5 0 00-5.2 2.2l1.4 1.4A5.5 5.5 0 018 6z" opacity="0.7"/><path d="M8 2.5c2.5 0 4.7 1 6.3 2.6l1.4-1.4A10 10 0 008 .5a10 10 0 00-7.7 3.2l1.4 1.4A8 8 0 018 2.5z" opacity="0.4"/></svg>
            <svg width="22" height="12" viewBox="0 0 22 12" fill="white"><rect x="0" y="1" width="18" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/><rect x="1.5" y="2.5" width="13" height="7" rx="1.2" fill="white"/><path d="M19 4v4a2 2 0 000-4z"/></svg>
        </div>
    </div>

    <div class="back-btn" onclick="window.location.href='Login.html'">← Back to Login</div>

    <div class="page-title">Create Account</div>
    <div class="page-subtitle">Sign up to get started</div>

    <div class="form-card">
        <div class="name-row">
            <input class="input-field" id="firstNameInput" type="text" placeholder="First Name">
            <input class="input-field" id="lastNameInput"  type="text" placeholder="Last Name">
        </div>
        <input class="input-field" id="usernameInput" type="text"     placeholder="Enter Username">
        <input class="input-field" id="emailInput"    type="email"    placeholder="Enter Email">
        <input class="input-field" id="passInput"     type="password" placeholder="Enter Password" style="margin-bottom:0">    
    </div>

    <button class="signup-btn" id="signupBtn">Create Account</button>

    <div class="login-link">Already have an account? <span onclick="window.location.href='Login.html'">Log In</span></div>

    <div class="home-indicator"></div>
    <div class="toast" id="toast"></div>
</div>
<script type="module" src="JS/signup.js"></script>
</body>
</html>
